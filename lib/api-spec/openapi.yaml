openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: demo
    description: Demo request operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /demo-requests:
    post:
      operationId: submitDemoRequest
      tags: [demo]
      summary: Submit a demo request
      description: Saves a demo booking request to persistent storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoRequestBody"
      responses:
        "201":
          description: Demo request saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoRequestResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DemoRequestBody:
      type: object
      properties:
        fullName:
          type: string
        businessName:
          type: string
        contact:
          type: string
        leadsPerDay:
          type: string
          enum:
            - "1-5"
            - "6-15"
            - "16-30"
            - "30+"
      required:
        - fullName
        - businessName
        - contact
        - leadsPerDay
    DemoRequestResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: string
        message:
          type: string
      required:
        - success
        - id
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
